bookdown::gitbook:
  css: style.css # This is how bookdown knows to look at style.css for formatting
  pandoc_args:
    - "--lua-filter=callouts.lua"
  includes:
    in_header:
      - fa-header.html
      - _bioschemas.html
  config:
    sharing:
      facebook: no
      twitter: no
    toc: # Table of Contents
      collapse: subsection
      before: |
        <a href="https://zambi.ca/">
         <img src="img/zambi.png" width="90%" alt="ZAMBI logo" style="display:block; margin-left:auto; margin-right:auto; margin-top:15px;">
         </a>
        <li><center><strong><a href="./"><br>Research Data Management<br><br></a></strong></center></li>
        <a href="./">
         <img src="img/rdm.png" width="70%" alt="Research Data Management logo" style="display:block; margin-left:auto; margin-right:auto; ">
         </a>
        <br>

      after: |
        <h1 id="sponsors">Sponsors</h1>
        <center>
        <a href="https://canamrnet.org/"><img src="img/sponsors/canamrnet.png" width=90% style="padding-bottom: 20px" alt="Canadian Institutes of Health Research logo."></a>

        <a href="https://canopytraining.ca/"><img src="img/sponsors/canopy.png" width=90% style="padding-bottom: 20px" alt="Canadian Institutes of Health Research logo."></a>

        <a href="https://www.bioinformatics.ca"><img src="img/sponsors/cbh-atl.png" width=90% style="padding-bottom: 20px" alt="Canadian Institutes of Health Research logo."></a>

        <a href="https://www.dal.ca/"><img src="img/sponsors/dal.png" width=90% style="padding-bottom: 20px" alt="Canadian Institutes of Health Research logo."></a>


    edit: https://github.com/bioinformaticsdotca/ZAMBI-RDM/blob/main/%s

    download: ["pdf", "epub"]
  number_sections: false
